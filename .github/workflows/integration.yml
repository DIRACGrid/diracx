name: Integration Tests

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'mkdocs.yml'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'mkdocs.yml'

defaults:
  run:
    shell: bash -el {0}

jobs:
  dirac-integration-tests:
    name: DIRAC Integration tests
    if: github.repository == 'DIRACGrid/diracx'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dirac-branch:
          - integration
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.14'
      - name: Clone DIRAC
        run: |
          pip install typer pyyaml gitpython packaging
          git clone https://github.com/AcquaDiGiorgio/DIRAC.git -b "diracx-issue-426-__all__-in-__init__" /tmp/DIRACRepo
          echo "Current revision: $(git -C /tmp/DIRACRepo rev-parse HEAD)"
      - name: Prepare environment
        run: cd /tmp/DIRACRepo && ./integration_tests.py prepare-environment "TEST_DIRACX=Yes" --diracx-src-dir "${GITHUB_WORKSPACE}"
      - name: Install server
        run:  cd /tmp/DIRACRepo && ./integration_tests.py install-server
      - name: Install client
        run: cd /tmp/DIRACRepo && ./integration_tests.py install-client
      - name: Install pilot
        run: cd /tmp/DIRACRepo && ./integration_tests.py install-pilot
      - name: Server tests
        run: cd /tmp/DIRACRepo && ./integration_tests.py test-server || touch server-tests-failed
      - name: Client tests
        run: cd /tmp/DIRACRepo && ./integration_tests.py test-client || touch client-tests-failed
      - name: Pilot tests
        run: cd /tmp/DIRACRepo && ./integration_tests.py test-pilot || touch pilot-tests-failed
      - name: Check test status
        run: |
          has_error=0
          # TODO: set has_error=1 when we are ready to really run the tests
          if [ -f server-tests-failed ]; then has_error=1; echo "Server tests failed"; fi
          if [ -f client-tests-failed ]; then has_error=1; echo "Client tests failed"; fi
          if [ -f pilot-tests-failed ]; then has_error=1; echo "Pilot tests failed"; fi
          if [ ${has_error} = 1 ]; then exit 1; fi
      - name: Debugging information
        if: always()
        run: |
          mkdir -p /tmp/service-logs

          echo "::group::Container status"
          docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Image}}\t{{.Ports}}"
          echo "::endgroup::"

          DIRACX_CONTAINERS="diracx diracx-init-keystore diracx-init-cs diracx-init-db diracx-chmod"

          for container in $DIRACX_CONTAINERS; do
            if docker inspect "$container" &>/dev/null; then
              echo "::group::Logs: $container"
              docker logs "$container" 2>&1 | tee -a /tmp/service-logs/diracx.log
              echo "::endgroup::"
            fi
          done

          echo "::group::DiracX API request summary"
          docker logs diracx 2>/dev/null | grep '/api/' \
            | awk -F\" '{print $2, $3}' \
            | awk '{print $1, $2, $4}' \
            | sort | uniq -c | sort || true
          echo "::endgroup::"

          echo "::group::DIRAC server logs"
          cd /tmp/DIRACRepo && ./integration_tests.py logs --no-follow --lines 1000 2>&1 | tee /tmp/service-logs/dirac.log || true
          echo "::endgroup::"
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: ${{ failure() }}
        with:
          name: service-logs-${{ github.job }}
          path: /tmp/service-logs/
