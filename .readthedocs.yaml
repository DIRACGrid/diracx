 version: 2

 build:
   os: "ubuntu-24.04"
   tools:
     python: "3"
   # We recommend using a requirements file for reproducible builds.
   # This is just a quick example to get started.
   # https://docs.readthedocs.io/page/guides/reproducible-builds.html
   jobs:
      create_environment:
        - asdf plugin add pixi
        - asdf install pixi latest
        - asdf global pixi latest

      install:
        - pixi install -e mkdocs
        - pixi add mkdocs-material
        - pixi add --pypi mkdocs-diracx-plugin@git+https://github.com/DIRACGrid/mkdocs-diracx-plugin

      build:
        html:
          - pixi run -e mkdocs mkdocs-build --site-dir $READTHEDOCS_OUTPUT/html
